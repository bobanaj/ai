<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0d0f; --surface: #17171a; --border: rgba(255,255,255,0.07); --green: #22c55e; --text: #f0f0f2; --muted: #666; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .pw-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .pw-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 300px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .pw-box h2 { font-size: 16px; font-weight: 500; }
    .pw-box p { font-size: 13px; color: var(--muted); text-align: center; }
    .pw-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; text-align: center; letter-spacing: 6px; outline: none; }
    .pw-box input:focus { border-color: rgba(34,197,94,0.4); }
    .pw-box button { width: 100%; padding: 12px; background: var(--green); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .pw-error { font-size: 12px; color: #f87171; display: none; }
    .admin-app { display: none; width: 100vw; height: 100dvh; flex-direction: row; }
    .sidebar { width: 260px; min-width: 260px; height: 100dvh; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .sidebar-title { font-size: 13px; font-weight: 500; flex: 1; }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .conv-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .conv-item { padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active { background: rgba(34,197,94,0.07); border-left: 2px solid var(--green); }
    .conv-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
    .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .conv-time { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .empty-convs { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.8; }
    .main-panel { flex: 1; display: flex; flex-direction: column; height: 100dvh; min-width: 0; }
    .main-header { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .main-header-name { font-size: 14px; font-weight: 500; }
    .main-header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .notif-bar { background: rgba(34,197,94,0.1); border-bottom: 1px solid rgba(34,197,94,0.2); padding: 8px 20px; font-size: 13px; color: var(--green); display: none; }
    .msgs-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .no-conv { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; flex-direction: column; gap: 8px; }
    .bw { display: flex; flex-direction: column; gap: 2px; }
    .bw.in { align-items: flex-start; }
    .bw.out { align-items: flex-end; }
    .blabel { font-size: 11px; color: var(--muted); padding: 0 4px; }
    .bb { max-width: 80%; padding: 9px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .bb.in { background: #6c63ff22; border: 1px solid #6c63ff33; color: #c4bfff; border-bottom-left-radius: 4px; }
    .bb.out { background: #16a34a22; border: 1px solid #22c55e33; color: #86efac; border-bottom-right-radius: 4px; }
    .tools-row { padding: 8px 16px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
    .tool-btn { padding: 6px 12px; background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .tool-btn:hover { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    .input-area textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; resize: none; min-height: 44px; max-height: 100px; }
    .input-area textarea:focus { border-color: rgba(34,197,94,0.3); }
    .input-area textarea::placeholder { color: var(--muted); }
    .input-area textarea:disabled { opacity: 0.4; }
    .reply-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--green); border: none; color: #000; font-size: 16px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .reply-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <h2>🔐 Accès restreint</h2>
    <p>Entre le mot de passe secret</p>
    <input type="password" id="pw-input" placeholder="••••••" maxlength="30" autofocus />
    <div class="pw-error" id="pw-error">❌ Mot de passe incorrect</div>
    <button onclick="checkPw()">Accéder</button>
  </div>
</div>

<div class="admin-app" id="admin-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="online-dot"></div>
      <div class="sidebar-title">Conversations</div>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="empty-convs">Aucune conversation<br>En attente de visiteurs...</div>
    </div>
  </div>

  <div class="main-panel">
    <div class="main-header">
      <div class="main-header-name" id="main-name">Sélectionne une conversation</div>
      <div class="main-header-sub" id="main-sub">← clique à gauche</div>
    </div>
    <div class="notif-bar" id="notif-bar">● Nouveau message !</div>
    <div class="msgs-area" id="msgs-area">
      <div class="no-conv">💬<br>Clique sur une conversation</div>
    </div>
    <div class="tools-row">
      <button class="tool-btn" onclick="sendTyping()">⋯ En train d'écrire...</button>
      <button class="tool-btn" onclick="stopTyping()">✕ Arrêter</button>
    </div>
    <div class="input-area">
      <textarea id="admin-input" placeholder="Ta réponse... (Entrée = envoyer)" disabled></textarea>
      <button class="reply-btn" id="reply-btn" onclick="sendReply()" disabled>✓</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SECRET = "squiduu";
const SUPABASE_URL  = "REMPLACE_MOI";
const SUPABASE_ANON = "REMPLACE_MOI";

let sb = null, auth = false;
let conversations = {};
let activeConv = null;
let convCounter = 0;
let convNumbers = {};

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === SECRET) {
    document.getElementById('pw-overlay').style.display = 'none';
    document.getElementById('admin-app').style.display = 'flex';
    auth = true;
    initSupabase();
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

async function initSupabase() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data } = await sb.from('messages').select('*').order('id');
  if (data) { data.forEach(m => processMsg(m, false)); renderConvList(); }
  sb.channel('msgs-admin').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
    processMsg(p.new, true);
    renderConvList();
  }).subscribe();
}

function processMsg(m, isNew) {
  if (m.role === 'typing' || m.role === 'typing_stop') return;
  const cid = m.conv_id || 'visiteur-1';
  if (!conversations[cid]) {
    convCounter++;
    convNumbers[cid] = convCounter;
    conversations[cid] = { id: cid, msgs: [], unread: 0, lastMsg: '', lastTime: '' };
  }
  const conv = conversations[cid];
  if (!conv.msgs.find(x => x.id === m.id)) conv.msgs.push(m);
  conv.lastMsg = m.text;
  conv.lastTime = m.created_at ? new Date(m.created_at).toLocaleTimeString('fr', { hour: '2-digit', minute: '2-digit' }) : '';
  if (isNew) {
    if (m.role === 'user') {
      if (activeConv === cid) { appendMsg(m); } else { conv.unread++; showNotif(cid); }
      if (document.hidden) { document.title = '🔴 Nouveau message !'; setTimeout(() => document.title = 'Admin', 3000); }
    } else if (m.role === 'ai' && activeConv === cid) { appendMsg(m); }
  }
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  const ids = Object.keys(conversations);
  if (!ids.length) return;
  list.innerHTML = '';
  ids.sort((a, b) => (conversations[b].msgs.at(-1)?.id || 0) - (conversations[a].msgs.at(-1)?.id || 0))
    .forEach(cid => {
      const conv = conversations[cid];
      const num = convNumbers[cid];
      const div = document.createElement('div');
      div.className = 'conv-item' + (cid === activeConv ? ' active' : '');
      div.innerHTML = `
        <div class="conv-name">👤 Visiteur ${num} ${conv.unread > 0 ? '<span class="unread-dot"></span>' : ''}</div>
        <div class="conv-preview">${conv.lastMsg || '...'}</div>
        <div class="conv-time">${conv.lastTime}</div>
      `;
      div.onclick = () => selectConv(cid);
      list.appendChild(div);
    });
}

function selectConv(cid) {
  activeConv = cid;
  conversations[cid].unread = 0;
  const num = convNumbers[cid];
  const conv = conversations[cid];
  document.getElementById('main-name').textContent = `Visiteur ${num}`;
  document.getElementById('main-sub').textContent = `${conv.msgs.filter(m => m.role === 'user').length} messages`;
  document.getElementById('admin-input').disabled = false;
  document.getElementById('reply-btn').disabled = false;
  document.getElementById('admin-input').focus();
  const area = document.getElementById('msgs-area');
  area.innerHTML = '';
  conv.msgs.forEach(m => appendMsg(m));
  renderConvList();
}

function appendMsg(m) {
  const area = document.getElementById('msgs-area');
  const isIn = m.role === 'user';
  const wrap = document.createElement('div');
  wrap.className = 'bw ' + (isIn ? 'in' : 'out');
  const label = document.createElement('div');
  label.className = 'blabel';
  label.textContent = isIn ? 'Utilisateur' : 'Toi (IA)';
  const b = document.createElement('div');
  b.className = 'bb ' + (isIn ? 'in' : 'out');
  b.textContent = m.text;
  wrap.appendChild(label);
  wrap.appendChild(b);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function showNotif(cid) {
  const n = document.getElementById('notif-bar');
  n.textContent = `● Nouveau message — Visiteur ${convNumbers[cid]} !`;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 4000);
}

async function sendReply() {
  if (!auth || !sb || !activeConv) return;
  const input = document.getElementById('admin-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await sb.from('messages').insert({ role: 'ai', text, conv_id: activeConv });
}

async function sendTyping() { if (sb && activeConv) await sb.from('messages').insert({ role: 'typing', text: '', conv_id: activeConv }); }
async function stopTyping() { if (sb && activeConv) await sb.from('messages').insert({ role: 'typing_stop', text: '', conv_id: activeConv }); }

document.getElementById('admin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
});
</script>
</body>
</html>
