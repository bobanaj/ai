<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #17171a;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff; --accent2: #a78bfa;
      --text: #f0f0f2; --muted: #888;
      --user-bubble: #6c63ff; --ai-bubble: #1e1e22;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .chat-wrap { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); }
    .header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; user-select: none; }
    .logo { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg, #6c63ff, #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; flex-shrink: 0; cursor: pointer; transition: transform 0.12s; -webkit-tap-highlight-color: transparent; }
    .logo.pop { transform: scale(0.82); }
    .header-info .name { font-size: 15px; font-weight: 500; }
    .header-info .status { font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 5px; }
    .header-info .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #4ade80; display: inline-block; }
    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.user { align-items: flex-end; }
    .bubble-wrap.ai { align-items: flex-start; }
    .bubble { max-width: 80%; padding: 11px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.55; word-break: break-word; }
    .bubble.user { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
    .bubble.ai { background: var(--ai-bubble); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .typing-bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; padding: 13px 18px; display: none; align-items: center; gap: 5px; align-self: flex-start; margin: 0 16px 8px; }
    .typing-bubble span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 1.3s infinite; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }
    .input-area { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: var(--bg); }
    .input-area input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 11px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .input-area input:focus { border-color: rgba(108,99,255,0.5); }
    .input-area input::placeholder { color: var(--muted); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
    .send-btn:hover { background: var(--accent2); }
    .send-btn:active { transform: scale(0.93); }
    .warn-bar { background: #2a1f00; border-bottom: 1px solid #f59e0b33; color: #fbbf24; font-size: 12px; padding: 8px 16px; text-align: center; display: none; }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="logo" id="logo">✦</div>
    <div class="header-info">
      <div class="name">Assistant IA</div>
      <div class="status">En ligne</div>
    </div>
  </div>
  <div class="warn-bar" id="warn-bar">⚠️ Firebase pas configuré — messages locaux seulement</div>
  <div class="messages" id="messages">
    <div class="bubble-wrap ai">
      <div class="bubble ai">Salut ! Comment je peux t'aider aujourd'hui ? 👋</div>
    </div>
  </div>
  <div class="typing-bubble" id="typing"><span></span><span></span><span></span></div>
  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Écris un message..." autocomplete="off" />
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
// ══════════════════════════════════════
// 5 CLICS RAPIDES SUR LE LOGO → ADMIN
// ══════════════════════════════════════
(function() {
  var logo = document.getElementById('logo');
  var count = 0;
  var timer = null;
  logo.addEventListener('click', function() {
    count++;
    logo.classList.add('pop');
    setTimeout(function(){ logo.classList.remove('pop'); }, 130);
    clearTimeout(timer);
    timer = setTimeout(function(){ count = 0; }, 900);
    if (count >= 5) {
      count = 0;
      window.location.href = 'admin.html';
    }
  });
})();

// ══════════════════════════════════════
// CONFIG FIREBASE — REMPLACE ICI
// ══════════════════════════════════════
var FIREBASE_API_KEY     = "REMPLACE_MOI";
var FIREBASE_DATABASE_URL = "https://REMPLACE_MOI-default-rtdb.firebaseio.com";
var FIREBASE_PROJECT_ID   = "REMPLACE_MOI";

var firebaseOK = FIREBASE_API_KEY !== "REMPLACE_MOI";
if (!firebaseOK) document.getElementById('warn-bar').style.display = 'block';

var messagesEl = document.getElementById('messages');
var typingEl   = document.getElementById('typing');
var input      = document.getElementById('msg-input');
var seenIds    = {};
var fbPush     = null;

if (firebaseOK) {
  var script1 = document.createElement('script');
  script1.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";
  script1.onload = function() {
    var script2 = document.createElement('script');
    script2.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";
    script2.onload = function() {
      firebase.initializeApp({
        apiKey: FIREBASE_API_KEY,
        databaseURL: FIREBASE_DATABASE_URL,
        projectId: FIREBASE_PROJECT_ID
      });
      var db = firebase.database();
      var ref = db.ref('messages');
      fbPush = function(obj) { ref.push(obj); };

      ref.on('child_added', function(snap) {
        var data = snap.val();
        var id = snap.key;
        if (seenIds[id]) return;
        seenIds[id] = true;

        if (data.role === 'typing') { typingEl.style.display = 'flex'; return; }
        if (data.role === 'typing_stop') { typingEl.style.display = 'none'; return; }
        typingEl.style.display = 'none';

        addBubble(data.role === 'user' ? 'user' : 'ai', data.text);
      });
    };
    document.head.appendChild(script2);
  };
  document.head.appendChild(script1);
}

function addBubble(role, text) {
  var wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;
  var b = document.createElement('div');
  b.className = 'bubble ' + role;
  b.textContent = text;
  wrap.appendChild(b);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMsg() {
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  if (firebaseOK && fbPush) {
    fbPush({ role: 'user', text: text, ts: Date.now() });
  } else {
    addBubble('user', text);
  }
}

input.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
