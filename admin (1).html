<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0d0f; --surface: #17171a; --border: rgba(255,255,255,0.07); --green: #22c55e; --text: #f0f0f2; --muted: #888; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; align-items: center; justify-content: center; }

    .pw-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .pw-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 300px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .pw-box h2 { font-size: 16px; font-weight: 500; }
    .pw-box p { font-size: 13px; color: var(--muted); text-align: center; }
    .pw-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; text-align: center; letter-spacing: 6px; outline: none; }
    .pw-box button { width: 100%; padding: 12px; background: var(--green); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .pw-error { font-size: 12px; color: #f87171; display: none; }

    .admin-app { display: none; width: 100%; max-width: 500px; height: 100dvh; flex-direction: column; }
    .admin-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .admin-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); }
    .admin-header-label { font-size: 15px; font-weight: 500; flex: 1; }
    .admin-header-sub { font-size: 12px; color: var(--muted); }
    .notif-bar { background: rgba(34,197,94,0.1); border-bottom: 1px solid rgba(34,197,94,0.2); padding: 9px 20px; font-size: 13px; color: var(--green); display: none; }
    .admin-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .empty { text-align: center; color: var(--muted); font-size: 13px; margin-top: 60px; line-height: 1.8; }
    .bw { display: flex; flex-direction: column; gap: 2px; }
    .bw.in { align-items: flex-start; }
    .bw.out { align-items: flex-end; }
    .blabel { font-size: 11px; color: var(--muted); padding: 0 4px; }
    .bb { max-width: 84%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .bb.in { background: #6c63ff22; border: 1px solid #6c63ff44; color: #c4bfff; border-bottom-left-radius: 4px; }
    .bb.out { background: #16a34a22; border: 1px solid #22c55e44; color: #86efac; border-bottom-right-radius: 4px; }
    .tools-row { padding: 8px 16px; display: flex; gap: 8px; }
    .tool-btn { padding: 7px 14px; background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .tool-btn:hover { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .admin-input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    .admin-input-area textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 11px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; resize: none; min-height: 50px; max-height: 120px; }
    .admin-input-area textarea::placeholder { color: var(--muted); }
    .reply-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--green); border: none; color: #000; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <h2>🔐 Accès restreint</h2>
    <p>Entre le mot de passe secret</p>
    <input type="password" id="pw-input" placeholder="••••••" maxlength="30" autofocus />
    <div class="pw-error" id="pw-error">❌ Mot de passe incorrect</div>
    <button onclick="checkPw()">Accéder</button>
  </div>
</div>

<div class="admin-app" id="admin-app">
  <div class="admin-header">
    <div class="admin-dot"></div>
    <div>
      <div class="admin-header-label">Panneau Admin 🟢</div>
      <div class="admin-header-sub">Tu réponds ici — apparaît comme une IA</div>
    </div>
  </div>
  <div class="notif-bar" id="notif-bar">● Nouveau message !</div>
  <div class="admin-msgs" id="admin-msgs">
    <div class="empty" id="empty-state">En attente de messages...<br><span style="font-size:11px">Les messages des utilisateurs apparaissent ici</span></div>
  </div>
  <div class="tools-row">
    <button class="tool-btn" onclick="sendTyping()">⋯ Afficher "en train d'écrire"</button>
    <button class="tool-btn" onclick="stopTyping()">✕ Arrêter</button>
  </div>
  <div class="admin-input-area">
    <textarea id="admin-input" placeholder="Ta réponse... (Entrée = envoyer)"></textarea>
    <button class="reply-btn" onclick="sendReply()">✓</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ══════════════════════════════════════
// MOT DE PASSE — CHANGE ICI
// ══════════════════════════════════════
const SECRET = "squiduu";

// ══════════════════════════════════════
// COLLE TES INFOS SUPABASE ICI
// ══════════════════════════════════════
const SUPABASE_URL  = "REMPLACE_MOI";
const SUPABASE_ANON = "REMPLACE_MOI";

let sb = null;
let auth = false;

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === SECRET) {
    document.getElementById('pw-overlay').style.display = 'none';
    document.getElementById('admin-app').style.display = 'flex';
    auth = true;
    initSupabase();
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

async function initSupabase() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Charge les anciens messages
  const { data } = await sb.from('messages').select('*').order('id');
  if (data && data.length > 0) {
    document.getElementById('empty-state')?.remove();
    data.forEach(m => {
      if (m.role === 'typing' || m.role === 'typing_stop') return;
      addAdminBubble(m.role, m.text);
    });
  }

  // Écoute les nouveaux messages
  sb.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
    const m = payload.new;
    if (m.role === 'typing' || m.role === 'typing_stop') return;
    document.getElementById('empty-state')?.remove();
    addAdminBubble(m.role, m.text);
    if (m.role === 'user') {
      const n = document.getElementById('notif-bar');
      n.style.display = 'block';
      setTimeout(() => n.style.display = 'none', 3000);
      if (document.hidden) { document.title = '🔴 Nouveau message !'; setTimeout(() => document.title = 'Admin', 3000); }
    }
  }).subscribe();
}

function addAdminBubble(role, text) {
  const isIn = role === 'user';
  const wrap = document.createElement('div');
  wrap.className = 'bw ' + (isIn ? 'in' : 'out');
  const label = document.createElement('div');
  label.className = 'blabel';
  label.textContent = isIn ? 'Utilisateur' : 'Toi (envoyé comme IA)';
  const b = document.createElement('div');
  b.className = 'bb ' + (isIn ? 'in' : 'out');
  b.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(b);
  document.getElementById('admin-msgs').appendChild(wrap);
  document.getElementById('admin-msgs').scrollTop = 99999;
}

async function sendReply() {
  if (!auth || !sb) return;
  const input = document.getElementById('admin-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await sb.from('messages').insert({ role: 'ai', text });
}

async function sendTyping() {
  if (sb) await sb.from('messages').insert({ role: 'typing', text: '' });
}

async function stopTyping() {
  if (sb) await sb.from('messages').insert({ role: 'typing_stop', text: '' });
}

document.getElementById('admin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
});
</script>
</body>
</html>
