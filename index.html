<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0d0f; --surface: #17171a; --border: rgba(255,255,255,0.07); --accent: #6c63ff; --text: #f0f0f2; --muted: #888; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; align-items: center; justify-content: center; transition: background 0.5s; }
    .chat-wrap { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; transition: background 0.5s; }
    .header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; user-select: none; transition: background 0.5s; }
    .logo { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg, #6c63ff, #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; flex-shrink: 0; cursor: pointer; transition: transform 0.12s; -webkit-tap-highlight-color: transparent; }
    .logo.pop { transform: scale(0.82); }
    .header-info .name { font-size: 15px; font-weight: 500; }
    .header-info .status { font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 5px; }
    .header-info .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #4ade80; display: inline-block; }
    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .bw { display: flex; flex-direction: column; }
    .bw.user { align-items: flex-end; }
    .bw.ai { align-items: flex-start; }
    .bubble { max-width: 80%; padding: 11px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.55; word-break: break-word; }
    .bubble.user { background: #6c63ff; color: white; border-bottom-right-radius: 4px; }
    .bubble.ai { background: #1e1e22; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble img { max-width: 220px; border-radius: 12px; display: block; }
    .blocked-screen { position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 999; }
    .blocked-screen p { color: #555; font-size: 14px; }
    .typing { background: #1e1e22; border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; padding: 13px 18px; display: none; align-items: center; gap: 5px; align-self: flex-start; margin: 0 16px 8px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 1.3s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }
    .input-area { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; transition: background 0.5s; }
    .input-area input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 11px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
    .input-area input::placeholder { color: var(--muted); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 16px; cursor: pointer; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="blocked-screen" id="blocked-screen"><p>🚫</p><p style="color:#555;font-size:14px;">Accès refusé</p></div>
<div class="chat-wrap">
  <div class="header" id="header">
    <div class="logo" id="logo">✦</div>
    <div class="header-info">
      <div class="name" id="ai-name">Assistant IA</div>
      <div class="status">En ligne</div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="bw ai"><div class="bubble ai">Salut ! Comment je peux t'aider ? 👋</div></div>
  </div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Écris un message..." autocomplete="off" />
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = "https://xqfjboboiaevewtypifv.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxZmpib2JvaWFldmV3dHlwaWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDg3NzQsImV4cCI6MjA4OTI4NDc3NH0.jvpfcNAe0ZN2sUeuU5pO-GyoNN2KNtOQaYmttPfcjpY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const messagesEl = document.getElementById('messages');
const typingEl   = document.getElementById('typing');
const input      = document.getElementById('msg-input');
const convId = localStorage.getItem('conv_id') || 'visiteur-' + Math.random().toString(36).substr(2, 8);
localStorage.setItem('conv_id', convId);
let typingTimer = null;

async function loadMessages() {
  const { data } = await sb.from('messages').select('*').eq('conv_id', convId).order('id');
  if (!data) return;
  data.forEach(m => handleMsg(m, false));
}
loadMessages();

sb.channel('msgs-' + convId).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'conv_id=eq.' + convId }, p => handleMsg(p.new, true)).subscribe();

const ONE_TIME_CMDS = ['/shake','/confetti','/matrix','/snow','/fire','/disco','/zoom','/rainbow','/explosion','/alien','/party','/thunderstorm','/meteor','/bubble','/hearts','/stars','/leaves','/coins','/glitch','/nuke','/aurora','/fireworks','/lasers','/ufo','/tsunami'];

function handleMsg(m, isNew) {
  if (m.role === 'typing') { typingEl.style.display = 'flex'; return; }
  if (m.role === 'typing_stop') { typingEl.style.display = 'none'; return; }
  if (m.role === 'cmd') {
    // Commandes one-time: seulement si message nouveau (pas au refresh)
    const isOneTime = ONE_TIME_CMDS.some(c => m.text === c);
    if (isOneTime && !isNew) return;
    executeCmd(m.text);
    return;
  }
  if (!isNew && m.role === 'user') { addBubble('user', m.text, false); return; }
  if (m.role === 'ai' || (isNew && m.role === 'user')) { typingEl.style.display = 'none'; addBubble(m.role, m.text, m.is_gif); }
}

function executeCmd(cmd) {
  const body = document.body;
  const wrap = document.querySelector('.chat-wrap');

  if (cmd.startsWith('/couleur ')) {
    const c = cmd.replace('/couleur ', '').trim();
    const map = { 'rose':'#1a0510','rouge':'#1a0808','bleu':'#08101a','vert':'#08120a','violet':'#100a1a','orange':'#1a0f08','noir':'#000000','defaut':'#0d0d0f' };
    const bg = map[c] || c;
    body.style.background = bg;
    wrap.style.background = bg;
    document.getElementById('header').style.background = bg;
    document.querySelector('.input-area').style.background = bg;
  } else if (cmd === '/bloquer') {
    document.getElementById('blocked-screen').style.display = 'flex';
    wrap.style.display = 'none';
  } else if (cmd.startsWith('/typing ')) {
    const secs = parseInt(cmd.replace('/typing ', '')) || 3;
    typingEl.style.display = 'flex';
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => { typingEl.style.display = 'none'; }, secs * 1000);
  } else if (cmd.startsWith('/titre ')) {
    document.getElementById('ai-name').textContent = cmd.replace('/titre ', '').trim();
  } else if (cmd === '/shake') {
    wrap.style.animation = 'none';
    const style = document.createElement('style');
    style.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-8px)}20%,40%,60%,80%{transform:translateX(8px)}}';
    document.head.appendChild(style);
    wrap.style.animation = 'shake 0.6s ease';
    setTimeout(() => { wrap.style.animation = ''; }, 700);
  } else if (cmd === '/confetti') {
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      const colors = ['#f87171','#fb923c','#facc15','#4ade80','#60a5fa','#c084fc','#f472b6'];
      c.style.cssText = `position:fixed;top:-10px;left:${Math.random()*100}vw;width:8px;height:8px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};pointer-events:none;z-index:9999;animation:fall ${1.5+Math.random()*2}s linear forwards;animation-delay:${Math.random()*0.5}s`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
    if (!document.getElementById('fall-style')) {
      const s = document.createElement('style');
      s.id = 'fall-style';
      s.textContent = '@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}';
      document.head.appendChild(s);
    }
  } else if (cmd === '/matrix') {
    const canvas = document.createElement('canvas');
    canvas.id = 'matrix-canvas';
    canvas.style.cssText = 'position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.7';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const cols = Math.floor(canvas.width / 14);
    const drops = Array(cols).fill(1);
    const mat = setInterval(() => {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#0f0'; ctx.font = '14px monospace';
      drops.forEach((y,i) => {
        ctx.fillText(String.fromCharCode(0x30A0+Math.random()*96), i*14, y*14);
        if (y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
    }, 50);
    setTimeout(() => { clearInterval(mat); canvas.remove(); }, 5000);
  } else if (cmd === '/flip') {
    wrap.style.transition = 'transform 0.6s';
    wrap.style.transform = wrap.style.transform === 'rotate(180deg)' ? '' : 'rotate(180deg)';
  } else if (cmd === '/ghost') {
    wrap.style.opacity = wrap.style.opacity === '0.3' ? '1' : '0.3';
  } else if (cmd === '/disco') {
    let h = 0;
    const disco = setInterval(() => {
      h = (h + 15) % 360;
      body.style.background = `hsl(${h},60%,8%)`;
    }, 100);
    setTimeout(() => { clearInterval(disco); body.style.background = '#0d0d0f'; }, 5000);
  } else if (cmd === '/zoom') {
    wrap.style.transition = 'transform 0.3s';
    wrap.style.transform = 'scale(1.1)';
    setTimeout(() => { wrap.style.transform = 'scale(1)'; }, 1000);
  } else if (cmd === '/snow') {
    for (let i = 0; i < 50; i++) {
      const s = document.createElement('div');
      s.textContent = '❄';
      s.style.cssText = `position:fixed;top:-20px;left:${Math.random()*100}vw;font-size:${12+Math.random()*16}px;pointer-events:none;z-index:9999;animation:fall ${3+Math.random()*3}s linear forwards;animation-delay:${Math.random()*2}s;opacity:0.8`;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 7000);
    }
  } else if (cmd === '/fire') {
    for (let i = 0; i < 40; i++) {
      const f = document.createElement('div');
      f.textContent = ['🔥','🌋','💥'][Math.floor(Math.random()*3)];
      f.style.cssText = `position:fixed;bottom:-20px;left:${Math.random()*100}vw;font-size:${16+Math.random()*20}px;pointer-events:none;z-index:9999;animation:rise ${2+Math.random()*2}s linear forwards;animation-delay:${Math.random()*1}s`;
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 5000);
    }
    if (!document.getElementById('rise-style')) {
      const s = document.createElement('style');
      s.id = 'rise-style';
      s.textContent = '@keyframes rise{to{transform:translateY(-110vh) rotate(20deg);opacity:0}}';
      document.head.appendChild(s);
    }
  } else if (cmd === '/rainbow') {
    let h = 0;
    const rb = setInterval(() => {
      h = (h + 2) % 360;
      document.querySelectorAll('.bubble.ai').forEach(b => b.style.borderColor = `hsl(${h},70%,50%)`);
    }, 30);
    setTimeout(() => { clearInterval(rb); document.querySelectorAll('.bubble.ai').forEach(b => b.style.borderColor = ''); }, 5000);
  } else if (cmd === '/blur') {
    wrap.style.filter = wrap.style.filter === 'blur(4px)' ? '' : 'blur(4px)';
  } else if (cmd === '/normal') {
    wrap.style.cssText = '';
    body.style.background = '#0d0d0f';
    wrap.style.opacity = '1';
    wrap.style.filter = '';
    wrap.style.transform = '';

  // ══════════ NOUVELLES COMMANDES ══════════

  // EFFETS VISUELS PERMANENTS
  } else if (cmd === '/neon') {
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.boxShadow = '0 0 10px #6c63ff, 0 0 20px #6c63ff'; b.style.borderColor = '#6c63ff'; });
    document.querySelectorAll('.bubble.user').forEach(b => { b.style.boxShadow = '0 0 10px #a78bfa, 0 0 20px #a78bfa'; });
  } else if (cmd === '/retro') {
    body.style.fontFamily = '"Courier New", monospace';
    wrap.style.border = '2px solid #0f0';
    body.style.background = '#000';
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.background = '#001100'; b.style.color = '#0f0'; b.style.border = '1px solid #0f0'; });
  } else if (cmd === '/vaporwave') {
    body.style.background = 'linear-gradient(135deg, #0d0221, #1a0533)';
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.background = 'rgba(255,0,255,0.1)'; b.style.borderColor = '#ff00ff'; b.style.color = '#ff99ff'; });
    document.querySelectorAll('.bubble.user').forEach(b => { b.style.background = 'linear-gradient(135deg, #00ffff44, #ff00ff44)'; });
  } else if (cmd === '/hacker') {
    body.style.background = '#000';
    body.style.fontFamily = 'monospace';
    document.querySelectorAll('.bubble').forEach(b => { b.style.color = '#00ff00'; b.style.background = '#001100'; b.style.border = '1px solid #00ff00'; });
  } else if (cmd === '/pastel') {
    body.style.background = '#1a1025';
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.background = '#2d1b4e'; b.style.color = '#e8d5ff'; b.style.borderColor = '#7c5cbf'; });
    document.querySelectorAll('.bubble.user').forEach(b => { b.style.background = '#1b3a4e'; b.style.color = '#d5f0ff'; });
  } else if (cmd === '/midnight') {
    body.style.background = '#000010';
    wrap.style.background = '#000010';
    document.getElementById('header').style.background = '#000010';
  } else if (cmd === '/gold') {
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.background = '#1a1500'; b.style.borderColor = '#ffd700'; b.style.color = '#ffd700'; });
    document.querySelectorAll('.bubble.user').forEach(b => { b.style.background = 'linear-gradient(135deg, #b8860b, #ffd700)'; b.style.color = '#000'; });
  } else if (cmd === '/pink') {
    body.style.background = '#1a0515';
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.background = '#2d0a25'; b.style.borderColor = '#ff69b4'; b.style.color = '#ffb3d9'; });
    document.querySelectorAll('.bubble.user').forEach(b => { b.style.background = 'linear-gradient(135deg, #ff1493, #ff69b4)'; });
  } else if (cmd === '/ocean') {
    body.style.background = '#000d1a';
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.background = '#001a2e'; b.style.borderColor = '#00bfff'; b.style.color = '#87ceeb'; });
    document.querySelectorAll('.bubble.user').forEach(b => { b.style.background = 'linear-gradient(135deg, #006994, #00bfff)'; });
  } else if (cmd === '/sunset') {
    body.style.background = '#1a0800';
    document.querySelectorAll('.bubble.ai').forEach(b => { b.style.background = '#2d1500'; b.style.borderColor = '#ff4500'; b.style.color = '#ffaa77'; });
    document.querySelectorAll('.bubble.user').forEach(b => { b.style.background = 'linear-gradient(135deg, #ff4500, #ff8c00)'; });

  // EFFETS ONE-TIME
  } else if (cmd === '/explosion') {
    const emojis = ['💥','🔥','⚡','💫','✨'];
    for (let i = 0; i < 60; i++) {
      const e = document.createElement('div');
      e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText = `position:fixed;top:50%;left:50%;font-size:${20+Math.random()*30}px;pointer-events:none;z-index:9999;animation:explode ${0.5+Math.random()}s ease-out forwards;transform-origin:center;`;
      const angle = Math.random()*360; const dist = 100+Math.random()*300;
      e.style.setProperty('--tx', `${Math.cos(angle*Math.PI/180)*dist}px`);
      e.style.setProperty('--ty', `${Math.sin(angle*Math.PI/180)*dist}px`);
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 2000);
    }
    if (!document.getElementById('explode-style')) {
      const s = document.createElement('style'); s.id='explode-style';
      s.textContent = '@keyframes explode{to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}';
      document.head.appendChild(s);
    }
  } else if (cmd === '/alien') {
    const msgs = ['👽 SIGNAL DETECTED', '🛸 WE ARE WATCHING', '📡 TRANSMISSION INCOMING', '👾 GREETINGS EARTHLING'];
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,255,0,0.05);z-index:9998;pointer-events:none;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:24px;color:#0f0;text-shadow:0 0 10px #0f0;animation:fadeInOut 3s forwards';
    overlay.textContent = msgs[Math.floor(Math.random()*msgs.length)];
    document.body.appendChild(overlay);
    if (!document.getElementById('fio-style')) {
      const s = document.createElement('style'); s.id='fio-style';
      s.textContent = '@keyframes fadeInOut{0%,100%{opacity:0}30%,70%{opacity:1}}';
      document.head.appendChild(s);
    }
    setTimeout(() => overlay.remove(), 3500);
  } else if (cmd === '/party') {
    const emojis = ['🎉','🎊','🥳','🍾','🎈','✨','🎆','🎇'];
    for (let i = 0; i < 50; i++) {
      const e = document.createElement('div');
      e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText = `position:fixed;top:-20px;left:${Math.random()*100}vw;font-size:${16+Math.random()*20}px;pointer-events:none;z-index:9999;animation:fall ${2+Math.random()*2}s linear forwards;animation-delay:${Math.random()*1.5}s`;
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 5000);
    }
  } else if (cmd === '/thunderstorm') {
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const flash = document.createElement('div');
        flash.style.cssText = 'position:fixed;inset:0;background:white;z-index:9999;pointer-events:none;opacity:0.8;animation:flashOut 0.15s forwards';
        document.body.appendChild(flash);
        if (!document.getElementById('flash-style')) {
          const s = document.createElement('style'); s.id='flash-style';
          s.textContent = '@keyframes flashOut{to{opacity:0}}';
          document.head.appendChild(s);
        }
        setTimeout(() => flash.remove(), 200);
      }, i * 400 + Math.random()*200);
    }
    for (let i = 0; i < 30; i++) {
      const r = document.createElement('div');
      r.textContent = '💧';
      r.style.cssText = `position:fixed;top:-10px;left:${Math.random()*100}vw;font-size:10px;pointer-events:none;z-index:9998;animation:fall ${1+Math.random()}s linear infinite;animation-delay:${Math.random()}s`;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 4000);
    }
  } else if (cmd === '/meteor') {
    for (let i = 0; i < 15; i++) {
      const m2 = document.createElement('div');
      m2.textContent = '☄️';
      m2.style.cssText = `position:fixed;top:${Math.random()*50}vh;left:-50px;font-size:${20+Math.random()*20}px;pointer-events:none;z-index:9999;animation:meteor ${1+Math.random()*2}s linear forwards;animation-delay:${Math.random()*2}s`;
      document.body.appendChild(m2);
      if (!document.getElementById('meteor-style')) {
        const s = document.createElement('style'); s.id='meteor-style';
        s.textContent = '@keyframes meteor{to{transform:translate(120vw,50vh);opacity:0}}';
        document.head.appendChild(s);
      }
      setTimeout(() => m2.remove(), 5000);
    }
  } else if (cmd === '/bubble') {
    for (let i = 0; i < 30; i++) {
      const b2 = document.createElement('div');
      b2.textContent = '🫧';
      b2.style.cssText = `position:fixed;bottom:-20px;left:${Math.random()*100}vw;font-size:${14+Math.random()*20}px;pointer-events:none;z-index:9999;animation:rise ${3+Math.random()*3}s linear forwards;animation-delay:${Math.random()*2}s`;
      document.body.appendChild(b2);
      setTimeout(() => b2.remove(), 7000);
    }
  } else if (cmd === '/hearts') {
    for (let i = 0; i < 40; i++) {
      const h2 = document.createElement('div');
      h2.textContent = ['❤️','💕','💖','💗','💓','💝'][Math.floor(Math.random()*6)];
      h2.style.cssText = `position:fixed;bottom:-20px;left:${Math.random()*100}vw;font-size:${14+Math.random()*18}px;pointer-events:none;z-index:9999;animation:rise ${2+Math.random()*3}s linear forwards;animation-delay:${Math.random()*1.5}s`;
      document.body.appendChild(h2);
      setTimeout(() => h2.remove(), 6000);
    }
  } else if (cmd === '/stars') {
    for (let i = 0; i < 50; i++) {
      const st = document.createElement('div');
      st.textContent = ['⭐','🌟','✨','💫'][Math.floor(Math.random()*4)];
      st.style.cssText = `position:fixed;top:${Math.random()*100}vh;left:${Math.random()*100}vw;font-size:${10+Math.random()*20}px;pointer-events:none;z-index:9999;animation:twinkle ${0.5+Math.random()*2}s ease-in-out infinite;animation-delay:${Math.random()}s`;
      document.body.appendChild(st);
      if (!document.getElementById('twinkle-style')) {
        const s = document.createElement('style'); s.id='twinkle-style';
        s.textContent = '@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(1.2)}}';
        document.head.appendChild(s);
      }
      setTimeout(() => st.remove(), 4000);
    }
  } else if (cmd === '/leaves') {
    const leafEmojis = ['🍂','🍁','🌿','🍃'];
    for (let i = 0; i < 35; i++) {
      const l = document.createElement('div');
      l.textContent = leafEmojis[Math.floor(Math.random()*leafEmojis.length)];
      l.style.cssText = `position:fixed;top:-20px;left:${Math.random()*100}vw;font-size:${14+Math.random()*16}px;pointer-events:none;z-index:9999;animation:sway ${3+Math.random()*3}s ease-in-out forwards;animation-delay:${Math.random()*2}s`;
      document.body.appendChild(l);
      if (!document.getElementById('sway-style')) {
        const s = document.createElement('style'); s.id='sway-style';
        s.textContent = '@keyframes sway{0%{transform:translateX(0)}25%{transform:translateX(30px)}75%{transform:translateX(-20px)}100%{transform:translate(0,110vh);opacity:0}}';
        document.head.appendChild(s);
      }
      setTimeout(() => l.remove(), 7000);
    }
  } else if (cmd === '/coins') {
    for (let i = 0; i < 40; i++) {
      const c2 = document.createElement('div');
      c2.textContent = ['🪙','💰','💵','💎'][Math.floor(Math.random()*4)];
      c2.style.cssText = `position:fixed;top:-20px;left:${Math.random()*100}vw;font-size:${12+Math.random()*18}px;pointer-events:none;z-index:9999;animation:fall ${1.5+Math.random()*2}s linear forwards;animation-delay:${Math.random()*1}s`;
      document.body.appendChild(c2);
      setTimeout(() => c2.remove(), 5000);
    }
  } else if (cmd === '/glitch') {
    const orig = wrap.style.cssText;
    let g = 0;
    const glitch = setInterval(() => {
      g++;
      if (g % 2 === 0) {
        wrap.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*5}px)`;
        wrap.style.filter = `hue-rotate(${Math.random()*360}deg) saturate(3)`;
      } else {
        wrap.style.transform = '';
        wrap.style.filter = '';
      }
      if (g > 20) { clearInterval(glitch); wrap.style.transform = ''; wrap.style.filter = ''; }
    }, 80);
  } else if (cmd === '/nuke') {
    const nuke = document.createElement('div');
    nuke.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:9999;pointer-events:none;animation:nukeFlash 2s forwards';
    nuke.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;animation:nukeGrow 1s forwards">☢️</div>';
    document.body.appendChild(nuke);
    if (!document.getElementById('nuke-style')) {
      const s = document.createElement('style'); s.id='nuke-style';
      s.textContent = '@keyframes nukeFlash{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}@keyframes nukeGrow{0%{transform:translate(-50%,-50%) scale(0)}50%{transform:translate(-50%,-50%) scale(3)}100%{transform:translate(-50%,-50%) scale(0)}}';
      document.head.appendChild(s);
    }
    setTimeout(() => nuke.remove(), 2500);
  } else if (cmd === '/aurora') {
    const aurora = document.createElement('div');
    aurora.id = 'aurora-overlay';
    aurora.style.cssText = 'position:fixed;inset:0;z-index:9997;pointer-events:none;background:linear-gradient(180deg,rgba(0,255,150,0.15),rgba(100,0,255,0.1),transparent);animation:auroraMove 3s ease-in-out infinite';
    document.body.appendChild(aurora);
    if (!document.getElementById('aurora-style')) {
      const s = document.createElement('style'); s.id='aurora-style';
      s.textContent = '@keyframes auroraMove{0%,100%{opacity:0.5;transform:translateY(0)}50%{opacity:1;transform:translateY(-20px)}}';
      document.head.appendChild(s);
    }
    setTimeout(() => { document.getElementById('aurora-overlay')?.remove(); }, 6000);
  } else if (cmd === '/fireworks') {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const x = Math.random()*80+10; const y = Math.random()*60+10;
        const colors2 = ['🎆','🎇','✨','💥'];
        for (let j = 0; j < 12; j++) {
          const fw = document.createElement('div');
          fw.textContent = colors2[Math.floor(Math.random()*colors2.length)];
          fw.style.cssText = `position:fixed;top:${y}vh;left:${x}vw;font-size:${14+Math.random()*16}px;pointer-events:none;z-index:9999;animation:fw ${0.8+Math.random()*0.5}s ease-out forwards;--tx:${(Math.random()-0.5)*200}px;--ty:${(Math.random()-0.5)*200}px`;
          document.body.appendChild(fw);
          setTimeout(() => fw.remove(), 2000);
        }
      }, i * 400);
    }
    if (!document.getElementById('fw-style')) {
      const s = document.createElement('style'); s.id='fw-style';
      s.textContent = '@keyframes fw{to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}';
      document.head.appendChild(s);
    }
  } else if (cmd === '/lasers') {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const laser = document.createElement('div');
        laser.style.cssText = `position:fixed;top:${Math.random()*100}vh;left:0;width:100vw;height:2px;background:linear-gradient(90deg,transparent,${['#f00','#0f0','#00f','#ff0','#f0f'][Math.floor(Math.random()*5)]},transparent);z-index:9999;pointer-events:none;animation:laserMove 0.5s linear forwards`;
        document.body.appendChild(laser);
        if (!document.getElementById('laser-style')) {
          const s = document.createElement('style'); s.id='laser-style';
          s.textContent = '@keyframes laserMove{0%{transform:scaleX(0);opacity:1}100%{transform:scaleX(1);opacity:0}}';
          document.head.appendChild(s);
        }
        setTimeout(() => laser.remove(), 600);
      }, i * 150);
    }
  } else if (cmd === '/ufo') {
    const ufo = document.createElement('div');
    ufo.textContent = '🛸';
    ufo.style.cssText = 'position:fixed;top:10vh;left:-80px;font-size:60px;pointer-events:none;z-index:9999;animation:ufoFly 3s ease-in-out forwards';
    document.body.appendChild(ufo);
    if (!document.getElementById('ufo-style')) {
      const s = document.createElement('style'); s.id='ufo-style';
      s.textContent = '@keyframes ufoFly{0%{left:-80px;top:10vh}40%{top:5vh}60%{top:15vh}100%{left:calc(100vw + 80px);top:10vh}}';
      document.head.appendChild(s);
    }
    setTimeout(() => ufo.remove(), 3500);
  } else if (cmd === '/tsunami') {
    const wave = document.createElement('div');
    wave.textContent = '🌊🌊🌊🌊🌊🌊🌊🌊🌊🌊🌊🌊';
    wave.style.cssText = 'position:fixed;bottom:-20px;left:-100%;font-size:60px;z-index:9999;pointer-events:none;animation:waveMove 2s ease-in-out forwards;white-space:nowrap';
    document.body.appendChild(wave);
    if (!document.getElementById('wave-style')) {
      const s = document.createElement('style'); s.id='wave-style';
      s.textContent = '@keyframes waveMove{0%{left:-100%;bottom:0}50%{bottom:30vh}100%{left:100%;bottom:0}}';
      document.head.appendChild(s);
    }
    setTimeout(() => wave.remove(), 2500);
  }
}
}

function addBubble(role, text, isGif) {
  const wrap = document.createElement('div');
  wrap.className = 'bw ' + (role === 'user' ? 'user' : 'ai');
  const b = document.createElement('div');
  b.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');
  if (isGif) { const img = document.createElement('img'); img.src = text; b.appendChild(img); }
  else b.textContent = text;
  wrap.appendChild(b);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await sb.from('messages').insert({ role: 'user', text, conv_id: convId });
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

let clicks = 0, timer = null;
document.getElementById('logo').addEventListener('click', () => {
  clicks++;
  document.getElementById('logo').classList.add('pop');
  setTimeout(() => document.getElementById('logo').classList.remove('pop'), 130);
  clearTimeout(timer);
  timer = setTimeout(() => { clicks = 0; }, 900);
  if (clicks >= 5) { clicks = 0; window.location.href = 'admin.html'; }
});
</script>
